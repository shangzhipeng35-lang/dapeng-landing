<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dapeng 项目导航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: linear-gradient(135deg, #191D2B 0%, #1E2438 50%, #252D45 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      max-width: 640px;
      padding: 40px 24px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #7B82A0;
      margin-bottom: 40px;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 24px 28px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      transition: all 0.25s ease;
      text-align: left;
    }

    .project-card:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .card-icon {
      font-size: 36px;
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
    }

    .card-info h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-info p {
      font-size: 13px;
      color: #7B82A0;
      line-height: 1.4;
    }

    .card-arrow {
      margin-left: auto;
      font-size: 20px;
      color: rgba(255,255,255,0.3);
      transition: transform 0.2s;
    }

    .project-card:hover .card-arrow {
      transform: translateX(4px);
      color: rgba(255,255,255,0.6);
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚀</div>
    <h1>Dapeng 项目导航</h1>
    <p class="subtitle">AI 驱动的价值投资知识库 & 互动游戏</p>

    <div class="projects">
      <a href="https://buffett.xiaoshen.xin" class="project-card">
        <div class="card-icon">🎩</div>
        <div class="card-info">
          <h3>AI 巴菲特</h3>
          <p>70年投资智慧 · 知识图谱 · AI 对话</p>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a href="https://draw.xiaoshen.xin" class="project-card">
        <div class="card-icon">🎨</div>
        <div class="card-info">
          <h3>你画我猜</h3>
          <p>AI 驱动的绘画猜谜游戏</p>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <p class="footer">© 2026 Dapeng</p>
  </div>
</body>
</html>
